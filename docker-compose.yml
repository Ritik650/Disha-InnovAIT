services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn disha.api.main:app --host 0.0.0.0 --port 8000
    ports: ["8000:8000"]
    volumes:
      - ./data:/app/data:ro

  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0"
    ports: ["5173:5173"]
    volumes:
      - ./app/web:/app
    environment:
      - VITE_API_BASE=http://api:8000
    depends_on: [api]
